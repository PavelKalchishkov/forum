spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/forum}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:4321}
  jpa:
    show-sql: true

app:
  jwt:
    secret: ${JWT_SECRET:dev-local-jwt-secret-key-for-local-development-only-32b}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    com.mse.edu.forum: DEBUG
